<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: #fcfcfc; color: #2d2f28; min-height: 100vh; }

  /* ── SWITCHER ── */
  .switcher {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 2000; background: #2d2f28; border-radius: 100px; padding: 5px;
    display: flex; gap: 3px; box-shadow: 0 8px 28px rgba(0,0,0,0.35);
  }
  .switcher button {
    background: transparent; border: none;
    color: rgba(252,252,252,0.45); font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600; padding: 7px 18px; border-radius: 100px;
    cursor: pointer; transition: all 0.18s; letter-spacing: 0.03em; white-space: nowrap;
  }
  .switcher button.on { background: #d8cb6a; color: #2d2f28; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0cab0; border-radius: 10px; }

  /* ── RESPONSIVE HELPERS ── */
  @media (max-width: 768px) {
    .hide-mobile { display: none !important; }
    .show-mobile { display: flex !important; }
  }
  @media (min-width: 769px) {
    .show-mobile { display: none !important; }
  }
</style>

/* ─── NAV ─── */
function Nav({ page, setPage }) {
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const links = ['Início','Imóveis','Sobre','Contato'];

  return (
    <>
      <nav style={{background: C.olive, height: 60, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 clamp(20px, 5vw, 48px)', position:'sticky', top:0, zIndex:500}}>
        {/* Logo */}
        <img src="uploads/Logo_fundoTransparente-7574853e.png" alt="Morabilidade" style={{height:46, width:'auto', objectFit:'contain'}}/>

        {/* Desktop nav */}
        <div className="hide-mobile" style={{display:'flex', alignItems:'center', gap:24}}>
          {links.map(l => {
            const isActive = (l==='Início'&&page==='inicio')||(l==='Imóveis'&&page==='imoveis')||(l==='Sobre'&&page==='sobre')||(l==='Contato'&&page==='contato');
            return (
              <a key={l} href="#" onClick={e=>{e.preventDefault(); if(l==='Início') setPage('inicio'); else if(l==='Imóveis') setPage('imoveis'); else if(l==='Sobre') setPage('sobre'); else if(l==='Contato') setPage('contato');}}
                style={{fontSize:14, color: isActive ? '#fcfcfc':'rgba(252,252,252,0.6)', textDecoration:'none',
                  borderBottom: isActive ? `1.5px solid ${C.gold}` : 'none',
                  paddingBottom: isActive ? 2 : 0, transition:'color 0.15s'}}>
                {l}
              </a>
            );
          })}
          <div style={{width:1, height:18, background:'rgba(252,252,252,0.18)'}}/>
          <a href="#" style={{color:'rgba(252,252,252,0.6)', display:'flex', alignItems:'center'}}><Ic.IG/></a>
          <a href="#" onClick={e=>{e.preventDefault(); setPage('imoveis');}}
            style={{background: C.gold, color: C.oliveDark, fontWeight:700, padding:'7px 16px', borderRadius:6, fontSize:13, textDecoration:'none', letterSpacing:'0.01em'}}>
            Ver imóveis
          </a>
        </div>

        {/* Mobile hamburger */}
        <button className="show-mobile" onClick={()=>setMobileOpen(v=>!v)}
          style={{background:'transparent', border:'none', color:'#fcfcfc', cursor:'pointer', padding:4, display:'flex', alignItems:'center'}}>
          {mobileOpen ? <Ic.X/> : <Ic.Menu/>}
        </button>
      </nav>

      {/* Mobile menu */}
      {mobileOpen && (
        <div className="show-mobile" style={{
          position:'fixed', top:60, left:0, right:0, bottom:0,
          background: C.oliveDark, zIndex:499, flexDirection:'column',
          padding:'32px 28px', gap:0,
        }}>
          {links.map(l => (
            <a key={l} href="#" onClick={e=>{e.preventDefault(); if(l==='Início') setPage('inicio'); else if(l==='Imóveis') setPage('imoveis'); else if(l==='Sobre') setPage('sobre'); else if(l==='Contato') setPage('contato'); setMobileOpen(false);}}
              style={{display:'block', padding:'18px 0', fontSize:22, fontFamily:'Playfair Display', color:'#fcfcfc',
                textDecoration:'none', borderBottom:'1px solid rgba(252,252,252,0.08)'}}>
              {l}
            </a>
          ))}
          <a href="#" onClick={e=>{e.preventDefault(); setPage('imoveis'); setMobileOpen(false);}}
            style={{display:'inline-flex', marginTop:32, background: C.gold, color: C.oliveDark,
              fontWeight:700, padding:'12px 24px', borderRadius:8, fontSize:15, textDecoration:'none', alignItems:'center', gap:8, width:'fit-content'}}>
            Ver imóveis <Ic.Arrow/>
          </a>
        </div>
      )}
    </>
  );
}

  { id:1, bairro:'Leblon', tipo:'Apartamento', neg:'Venda', quartos:3, area:120, preco:'R$ 2.800.000',

    img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800&q=80&auto=format' },
  { id:5, bairro:'Gávea', tipo:'Cobertura', neg:'Venda', quartos:3, area:180, preco:'R$ 3.400.000',

];
const bairros = ['Todos','Leblon','Ipanema','Jardim Botânico','Lagoa','Gávea','Laranjeiras'];

/* ─── FILTER PILL ─── */
function Pill({ label, active, onClick }) {
  const [h, setH] = React.useState(false);
  return (
    <button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} onClick={onClick} style={{
      display:'flex', alignItems:'center',
      background: active ? C.olive : h ? '#f0ede3' : '#fcfcfc',
      color: active ? '#fcfcfc' : C.olive,
      border: `1.5px solid ${active ? C.olive : C.border}`,
      borderRadius:100, padding:'7px 16px', fontSize:13,
      fontFamily:'Inter', fontWeight: active ? 600 : 400,
      cursor:'pointer', transition:'all 0.15s', whiteSpace:'nowrap',
    }}>{label}</button>
  );
}

function SelectPill({ value, onChange, options }) {
  return (
    <div style={{position:'relative', display:'flex', alignItems:'center', flexShrink:0}}>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{
        appearance:'none', background:'#fcfcfc', border:`1.5px solid ${C.border}`,
        borderRadius:100, padding:'7px 34px 7px 16px', fontSize:13,
        fontFamily:'Inter', color: C.olive, cursor:'pointer', outline:'none', whiteSpace:'nowrap',
      }}>
        {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
      <span style={{position:'absolute', right:12, pointerEvents:'none', color: C.oliveLight, display:'flex', alignItems:'center'}}>
        <Ic.Chevron/>
      </span>
    </div>
  );
}

/* ─── CARD ─── */
function Card({ im }) {
  const [h, setH] = React.useState(false);
  return (
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{
      background:'#fcfcfc', borderRadius:14, overflow:'hidden', cursor:'pointer',
      boxShadow: h ? '0 16px 40px rgba(88,90,79,0.2)' : '0 2px 10px rgba(88,90,79,0.08)',
      transform: h ? 'translateY(-4px)' : 'translateY(0)',
      transition:'all 0.25s cubic-bezier(0.4,0,0.2,1)',
      border:`1px solid ${h ? 'transparent' : C.border}`,
    }}>
      <div style={{position:'relative', paddingTop:'64%', overflow:'hidden', background:'#e8e5db'}}>
        <img src={im.img} alt={im.bairro} style={{
          position:'absolute', top:0, left:0, width:'100%', height:'100%', objectFit:'cover',
          transform: h ? 'scale(1.05)' : 'scale(1)', transition:'transform 0.4s ease',
        }}/>
        {/* Neg badge */}
        <div style={{
          position:'absolute', top:14, left:14,
          background: im.neg==='Venda' ? C.gold : C.olive,
          color: im.neg==='Venda' ? C.oliveDark : '#fcfcfc',
          fontSize:10, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase',
          padding:'4px 10px', borderRadius:100,
        }}>{im.neg}</div>
        {/* Bairro badge */}
        <div style={{
          position:'absolute', bottom:14, left:14,
          background:'rgba(252,252,252,0.92)',
          color: C.olive, fontSize:12, fontWeight:600,
          padding:'4px 10px', borderRadius:100,
          display:'flex', alignItems:'center', gap:5,
        }}><Ic.Pin/>{im.bairro}</div>
      </div>

      <div style={{padding:'18px 20px 20px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
          <div>
            <div style={{fontSize:11, color: C.textMuted, fontWeight:500, marginBottom:4, textTransform:'uppercase', letterSpacing:'0.07em'}}>{im.tipo}</div>
            <div style={{fontSize:19, fontFamily:'Playfair Display', fontWeight:500, color: C.text, lineHeight:1.2}}>{im.preco}</div>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5, marginTop:2}}>
            <span style={{fontSize:12, color: C.textMuted, display:'flex', alignItems:'center', gap:4}}><Ic.Bed/>{im.quartos} quartos</span>
            <span style={{fontSize:12, color: C.textMuted, display:'flex', alignItems:'center', gap:4}}><Ic.Area/>{im.area} m²</span>
          </div>
        </div>
        <p style={{fontSize:13, color:'#9a9c8f', lineHeight:1.65, fontStyle:'italic', borderTop:`1px solid ${C.border}`, paddingTop:12}}>
          "{im.nota}"
        </p>
        <div style={{marginTop:14, display:'flex', alignItems:'center', gap:6, fontSize:13, fontWeight:600, color: C.olive}}>
          Ver detalhes <Ic.Arrow/>
        </div>
      </div>
    </div>
  );
}

/* ─── PAGE IMOVEIS ─── */
function PageImoveis() {
  const [neg, setNeg] = React.useState('todos');
  const [bairro, setBairro] = React.useState('Todos');
  const [tipo, setTipo] = React.useState('todos');

  const filtrados = imoveis.filter(im => {
    if (neg !== 'todos' && im.neg.toLowerCase() !== neg) return false;
    if (bairro !== 'Todos' && im.bairro !== bairro) return false;
    if (tipo !== 'todos' && im.tipo.toLowerCase() !== tipo) return false;
    return true;
  });

  return (
    <div>
      {/* Header */}
      <div style={{background: C.olive, padding:'clamp(36px,5vw,56px) clamp(20px,5vw,48px) clamp(40px,5vw,52px)'}}>
        <div style={{maxWidth:1080, margin:'0 auto'}}>
          <div style={{fontSize:11, letterSpacing:'0.18em', fontWeight:600, color: C.gold, textTransform:'uppercase', marginBottom:12}}>Portfólio · Curadoria</div>
          <h1 style={{fontFamily:'Playfair Display', fontSize:'clamp(32px,5vw,50px)', fontWeight:500, color:'#fcfcfc', lineHeight:1.1, marginBottom:14}}>
            Cada imóvel tem<br/><em>uma história</em>
          </h1>
          <p style={{fontSize:15, color:'rgba(252,252,252,0.6)', maxWidth:440, lineHeight:1.75}}>
            Selecionamos apenas os imóveis que nos encantam: pela arquitetura, pelo bairro, pelo potencial. Zona Sul, Rio de Janeiro.
          </p>
        </div>
      </div>

      {/* Filters */}
      <div style={{background:'#fcfcfc', borderBottom:`1px solid ${C.border}`, position:'sticky', top:60, zIndex:90}}>
        <div style={{maxWidth:1080+96, margin:'0 auto', padding:'0 clamp(20px,5vw,48px)', height:60, display:'flex', alignItems:'center', gap:8, overflowX:'auto'}}>
          <span style={{display:'flex', alignItems:'center', gap:6, fontSize:13, color: C.textMuted, flexShrink:0}}>
            <Ic.Filter/> <span className="hide-mobile">Filtros</span>
          </span>
          <div style={{width:1, height:20, background: C.border, flexShrink:0}}/>
          {[{v:'todos',l:'Tudo'},{v:'venda',l:'Venda'},{v:'locação',l:'Locação'}].map(({v,l})=>(
            <Pill key={v} label={l} active={neg===v} onClick={()=>setNeg(v)}/>
          ))}
          <div style={{width:1, height:20, background: C.border, flexShrink:0}}/>
          <SelectPill value={bairro} onChange={setBairro}
            options={bairros.map(b=>({v:b, l: b==='Todos'?'Todos os bairros':b}))}/>
          <SelectPill value={tipo} onChange={setTipo}
            options={[{v:'todos',l:'Todos os tipos'},{v:'apartamento',l:'Apartamento'},{v:'casa',l:'Casa'},{v:'cobertura',l:'Cobertura'}]}/>
          <div style={{marginLeft:'auto', fontSize:12, color: C.textMuted, flexShrink:0, fontStyle:'italic', whiteSpace:'nowrap'}}>
            {filtrados.length} {filtrados.length===1?'imóvel':'imóveis'}
          </div>
        </div>
      </div>

      {/* Grid */}
      <div style={{maxWidth:1080+96, margin:'0 auto', padding:'clamp(28px,4vw,44px) clamp(20px,5vw,48px) 100px'}}>
        {filtrados.length > 0 ? (
