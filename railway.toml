[build]
builder = "dockerfile"
dockerfilePath = "api/Dockerfile"

[deploy]
# Sem startCommand: usamos o CMD do Dockerfile, que faz `sh -c uvicorn ... --port ${PORT:-8000}`.
# O Railway passa startCommand direto pro processo sem shell, então tentar
# expansão de variável aqui resulta em "Invalid value for '--port'" (a string
# literal vai pro uvicorn). O CMD do Dockerfile usa exec form com `sh -c`,
# que expande $PORT corretamente.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
