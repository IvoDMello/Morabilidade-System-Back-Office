[build]
builder = "dockerfile"
dockerfilePath = "api/Dockerfile"

[deploy]
# Porta hardcoded em 8000 — é a config que funcionou em prod por meses antes
# do experimento de PORT dinâmico em 2026-05-26 quebrar tudo. Voltamos pra cá.
# A solução do healthcheck (que estava falhando silenciosamente) foi adicionar
# o endpoint /health no main.py (commit 2de2252).
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
