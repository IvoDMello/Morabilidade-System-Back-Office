[build]
builder = "dockerfile"
dockerfilePath = "api/Dockerfile"

[deploy]
# Sem startCommand: o CMD do Dockerfile (`sh -c "uvicorn ... --port ${PORT:-8000}"`)
# expande $PORT corretamente. Confirmado em 2026-05-26: o Railway injeta
# PORT=8080 e a app sobe em 0.0.0.0:8080. Hardcodar 8000 faz o app escutar
# numa porta diferente da que o Railway roteia → healthcheck timeout + 502.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
