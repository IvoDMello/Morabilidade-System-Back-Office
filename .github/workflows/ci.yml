name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          RESEND_API_KEY: "test"
          EMAIL_FROM: "test@morabilidade.com"
          APP_SECRET_KEY: "ci_app_secret_key"
          CORS_ORIGINS: "http://localhost:3000"
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

      # Módulos financeiros (repasse/demonstrativos) têm piso próprio, mais
      # alto que o global: regressão de cobertura aqui muda valor em PDF.
      - name: Coverage floor — módulos financeiros
        run: coverage report --fail-under=90 --include="app/services/fechamento.py,app/services/demonstrativo_pdf.py,app/services/demonstrativo_admin_pdf.py,app/routers/locacoes.py"

  web:
    name: Admin Panel (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

  site:
    name: Site Público (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  captacoes:
    name: Captações (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: captacoes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: captacoes/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

      - name: Build
        env:
          # Valores dummy só para o `next build` coletar dados das páginas;
          # os segredos reais vivem no projeto Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key
        run: npm run build
